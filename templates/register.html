{% extends 'base.html' %}
{% block title %}Đăng ký tài khoản{% endblock %}

{% block content %}
<section class="login-section">
    <div class="login-box">
        <div class="login-box-header">
            <div class="login-logo">📚</div>
            <h2>NEU Syllabus</h2>
            <p>Đại học Kinh tế Quốc dân</p>
        </div>
        <div class="login-box-body">
            <div class="auth-tabs">
                <a href="{{ url_for('login') }}" class="auth-tab">Đăng nhập</a>
                <a href="{{ url_for('register') }}" class="auth-tab active">Đăng ký</a>
            </div>
            <form method="post">
                <div class="auth-input-group">
                    <label for="username">Tên đăng nhập</label>
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" required autofocus
                           minlength="3" placeholder="Ít nhất 3 ký tự"
                           value="{{ request.form.get('username', '') }}">
                </div>
                <div class="auth-input-group">
                    <label for="password">Mật khẩu</label>
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" required
                           minlength="6" placeholder="Ít nhất 6 ký tự">
                </div>
                <div class="auth-input-group">
                    <label for="confirm_password">Xác nhận mật khẩu</label>
                    <span class="input-icon">🔐</span>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           minlength="6" placeholder="Nhập lại mật khẩu">
                </div>
                <button type="submit" class="btn-auth">Đăng ký</button>
            </form>
            <div class="auth-divider">Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></div>
        </div>
    </div>
</section>
{% endblock %}
