{% extends 'base.html' %}
{% block title %}Đăng ký tài khoản{% endblock %}

{% block content %}
<section class="section login-section">
    <div class="login-box">
        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="auth-tab">Đăng nhập</a>
            <a href="{{ url_for('register') }}" class="auth-tab active">Đăng ký</a>
        </div>
        <h2>Đăng ký tài khoản</h2>
        <form method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required autofocus
                       minlength="3" placeholder="Ít nhất 3 ký tự"
                       value="{{ request.form.get('username', '') }}">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required
                       minlength="6" placeholder="Ít nhất 6 ký tự">
            </div>
            <div class="form-group">
                <label for="confirm_password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       minlength="6" placeholder="Nhập lại mật khẩu">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
        </form>
        <p class="auth-link">Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
    </div>
</section>
{% endblock %}
