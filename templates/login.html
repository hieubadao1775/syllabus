{% extends 'base.html' %}
{% block title %}Đăng nhập{% endblock %}

{% block content %}
<section class="section login-section">
    <div class="login-box">
        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="auth-tab active">Đăng nhập</a>
            <a href="{{ url_for('register') }}" class="auth-tab">Đăng ký</a>
        </div>
        <h2>Đăng nhập</h2>
        <form method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
        </form>
        <p class="auth-link">Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký ngay</a></p>
    </div>
</section>
{% endblock %}
